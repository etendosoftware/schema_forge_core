# =============================================================================
# SonarQube Configuration — Schema Forge (JavaScript/JSX)
# =============================================================================
# Usage:
#   sonar-scanner -Dproject.settings=sonar-project.properties
#   make sonar
#
# Analyzes the Schema Forge CLI tools and app-shell frontend code.
# =============================================================================

sonar.host.url=https://sonar.etendo.cloud
sonar.projectKey=etendosoftware_etendo_schema_forge_133209fc-d4ea-4f26-8699-8c76cb26648c
sonar.projectName=Schema Forge
sonar.projectVersion=1.0

sonar.sourceEncoding=UTF-8

# ---------------------------------------------------------------------------
# SOURCE DIRECTORIES
# ---------------------------------------------------------------------------
sonar.sources=\
  cli/src,\
  tools/app-shell/src,\
  tools/decision-panel/src,\
  tools/ui-preview/src,\
  tools/report-server

# ---------------------------------------------------------------------------
# TEST DIRECTORIES
# ---------------------------------------------------------------------------
sonar.tests=\
  cli/test,\
  tools/app-shell/test,\
  tools/app-shell/src/lib/__tests__,\
  tools/app-shell/src/auth/__tests__,\
  e2e

sonar.test.inclusions=\
  **/*.test.js,\
  **/*.test.jsx,\
  **/*.spec.js,\
  **/*.spec.jsx

# ---------------------------------------------------------------------------
# COVERAGE (Node.js built-in coverage or c8/istanbul)
# ---------------------------------------------------------------------------
sonar.javascript.lcov.reportPaths=\
  coverage/cli-lcov.info,\
  coverage/appshell-lcov.info,\
  coverage/appshell-test-lcov.info,\
  coverage/vitest-lcov.info

# ---------------------------------------------------------------------------
# EXCLUSIONS
# ---------------------------------------------------------------------------
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/__tests__/**,\
  artifacts/**/generated/**,\
  artifacts/**/mockData.js,\
  artifacts/**/custom/**/*.test.js,\
  artifacts/**/custom/**/*.test.jsx,\
  **/*.config.js,\
  **/*.config.cjs,\
  **/fixtures/**,\
  **/.superpowers/**

sonar.coverage.exclusions=\
  **/*.test.js,\
  **/*.test.jsx,\
  **/*.spec.js,\
  **/*.spec.jsx,\
  **/__tests__/**,\
  **/fixtures/**,\
  e2e/**,\
  tools/decision-panel/**,\
  tools/ui-preview/**,\
  **/*.css,\
  **/*.json,\
  **/vite-plugins/**,\
  **/*-tokens.js,\
  **/modal-styles.js,\
  **/sectionColors.js


# ---------------------------------------------------------------------------
# CPD (Duplicate Code) EXCLUSIONS
# ---------------------------------------------------------------------------
sonar.cpd.exclusions=\
  **/*.test.js,\
  **/*.test.jsx,\
  artifacts/**,\
  e2e/**
