# =============================================================================
# SonarQube Configuration — Schema Forge (JavaScript/JSX)
# =============================================================================
# Usage:
#   sonar-scanner -Dproject.settings=sonar-project.properties
#   make sonar
#
# Analyzes the Schema Forge CLI tools and app-shell frontend code.
# =============================================================================

sonar.host.url=https://sonar.etendo.cloud
sonar.projectKey=etendosoftware_schema_forge_core_976a1e0b-4b24-4757-a2f4-8afa9a5e0289
sonar.projectName=Schema Forge Core
sonar.projectVersion=1.0

sonar.sourceEncoding=UTF-8

# ---------------------------------------------------------------------------
# SOURCE DIRECTORIES
# ---------------------------------------------------------------------------
sonar.sources=\
  cli/src,\
  tools/decision-panel/src,\
  tools/ui-preview/src,\
  tools/report-server

# ---------------------------------------------------------------------------
# TEST DIRECTORIES
# ---------------------------------------------------------------------------
sonar.tests=\
  cli/test,\
  packages/app-shell-core/src/auth/__tests__,\
  packages/app-shell-core/src/components/ui/__tests__,\
  packages/app-shell-core/src/i18n/__tests__,\
  packages/app-shell-core/test,\
  packages/schema-forge-core/test

sonar.test.inclusions=\
  **/*.test.js,\
  **/*.test.jsx,\
  **/*.spec.js,\
  **/*.spec.jsx

# ---------------------------------------------------------------------------
# COVERAGE (Node.js built-in coverage or c8/istanbul)
# ---------------------------------------------------------------------------
sonar.javascript.lcov.reportPaths=\
  coverage/merged-lcov.info

# ---------------------------------------------------------------------------
# EXCLUSIONS
# ---------------------------------------------------------------------------
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/__tests__/**,\
  packages/app-shell-core/src/**,\
  packages/schema-forge-core/src/**,\
  **/*.config.js,\
  **/*.config.cjs,\
  **/fixtures/**,\
  **/.superpowers/**

sonar.coverage.exclusions=\
  **/*.test.js,\
  **/*.test.jsx,\
  **/*.spec.js,\
  **/*.spec.jsx,\
  **/__tests__/**,\
  **/fixtures/**,\
  tools/decision-panel/**,\
  tools/ui-preview/**,\
  **/*.css,\
  **/*.json,\
  packages/app-shell-core/src/**,\
  packages/schema-forge-core/src/**,\
  **/vite-plugins/**,\
  **/*-tokens.js,\
  **/modal-styles.js,\
  **/sectionColors.js


# ---------------------------------------------------------------------------
# CPD (Duplicate Code) EXCLUSIONS
# ---------------------------------------------------------------------------
sonar.cpd.exclusions=\
  **/*.test.js,\
  **/*.test.jsx,\
  packages/app-shell-core/src/**,\
  packages/schema-forge-core/src/**
