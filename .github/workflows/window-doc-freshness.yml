name: Window Doc Freshness

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:

permissions:
  contents: read
  issues: write

jobs:
  window-doc-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve diff range
        id: range
        uses: actions/github-script@v7
        with:
          script: |
            const isPullRequest = context.eventName === 'pull_request';
            const base = isPullRequest
              ? context.payload.pull_request.base.sha
              : context.payload.before;
            const head = isPullRequest
              ? context.payload.pull_request.head.sha
              : context.sha;

            core.setOutput('base', base || '');
            core.setOutput('head', head || '');

      - name: Check affected window docs
        id: check
        run: |
          REPORT_FILE="$(mktemp)"
          if node cli/src/check-window-docs.js --base "${{ steps.range.outputs.base }}" --head "${{ steps.range.outputs.head }}" >"$REPORT_FILE" 2>&1; then
            echo "missing=false" >> "$GITHUB_OUTPUT"
          else
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Window-specific changes are missing updates in docs/generated-custom-windows/."
          fi

          {
            echo 'report<<EOF'
            cat "$REPORT_FILE"
            echo EOF
          } >> "$GITHUB_OUTPUT"

          cat "$REPORT_FILE"

      - name: Publish latest warning comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          WINDOW_DOC_MISSING: ${{ steps.check.outputs.missing }}
          WINDOW_DOC_REPORT: ${{ steps.check.outputs.report }}
        with:
          script: |
            const marker = '<!-- window-doc-freshness -->';
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const managedComments = comments.filter((comment) =>
              comment.user?.login === 'github-actions[bot]' && comment.body?.includes(marker)
            );

            for (const comment of managedComments) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
              });
            }

            if (process.env.WINDOW_DOC_MISSING !== 'true') {
              return;
            }

            const body = [
              marker,
              '## Window doc freshness warning',
              '',
              'This PR changes one or more window surfaces without updating the matching functional guide in `docs/generated-custom-windows/`.',
              '',
              '```text',
              process.env.WINDOW_DOC_REPORT || 'Window doc freshness warning triggered.',
              '```',
              '',
              'For now this is a warning only; it does not block the workflow.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body,
            });