name: Deploy SPA

on:
  push:
    branches:
      - develop
      - epic/ETP-3504

jobs:
  deploy:
    name: Build & deploy to S3 + CloudFront
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve deployment target
        id: target
        run: |
          if [[ "${{ github.ref_name }}" == "develop" ]]; then
            echo "s3_bucket=${{ vars.S3_BUCKET_STAGING }}" >> $GITHUB_OUTPUT
            echo "cf_distribution=${{ vars.CF_DISTRIBUTION_STAGING }}" >> $GITHUB_OUTPUT
            echo "env_label=staging" >> $GITHUB_OUTPUT
            echo "public_origin=https://go.staging.etendo.cloud" >> $GITHUB_OUTPUT
          else
            echo "s3_bucket=${{ vars.S3_BUCKET_EXPERIMENTAL }}" >> $GITHUB_OUTPUT
            echo "cf_distribution=${{ vars.CF_DISTRIBUTION_EXPERIMENTAL }}" >> $GITHUB_OUTPUT
            echo "env_label=experimental" >> $GITHUB_OUTPUT
            echo "public_origin=https://go.experimental.etendo.cloud" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app-shell
        run: npm run build --workspace=tools/app-shell
        env:
          # VITE_PUBLIC_ORIGIN is consumed by mcpWellKnownPlugin (vite.config.js)
          # to emit static RFC 9728 / RFC 8414 discovery docs at /.well-known/*
          # with absolute URLs per environment. See docs/ops/cloudfront-alb-routing.md.
          VITE_PUBLIC_ORIGIN: ${{ steps.target.outputs.public_origin }}
          # VITE_BUILD_ID is unique per workflow run (even same commit) — ensures sw.js
          # always differs between deploys so the service worker updates on every redeploy
          VITE_BUILD_ID: ${{ github.run_id }}
          # CloudWatch RUM — IDs stored as GitHub Actions variables (not in repo)
          VITE_RUM_APP_MONITOR_ID_STAGING: ${{ vars.RUM_APP_MONITOR_ID_STAGING }}
          VITE_RUM_IDENTITY_POOL_ID_STAGING: ${{ vars.RUM_IDENTITY_POOL_ID_STAGING }}
          VITE_RUM_APP_MONITOR_ID_EXPERIMENTAL: ${{ vars.RUM_APP_MONITOR_ID_EXPERIMENTAL }}
          VITE_RUM_IDENTITY_POOL_ID_EXPERIMENTAL: ${{ vars.RUM_IDENTITY_POOL_ID_EXPERIMENTAL }}
        # .env.production (committed) provides VITE_MOCK=false and VITE_API_BASE=/etendo

      - name: Generate reports manifest
        run: node cli/src/generate-reports-manifest.js

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ vars.AWS_REGION }}

      - name: Sync dist to S3 (${{ steps.target.outputs.env_label }})
        run: |
          # Long-lived immutable assets (hashed files under assets/, icons, etc.)
          # .well-known/* is EXCLUDED here — OAuth2/MCP discovery metadata must
          # never be cached with immutable headers; a rollback or endpoint change
          # would leave stale metadata pinned in every CDN edge for up to a year.
          aws s3 sync tools/app-shell/dist/ s3://${{ steps.target.outputs.s3_bucket }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "registerSW.js" \
            --exclude "manifest.webmanifest" \
            --exclude "sw.js" \
            --exclude ".well-known/*"
          # HTML, SW and manifest must not be cached long-term
          aws s3 sync tools/app-shell/dist/ s3://${{ steps.target.outputs.s3_bucket }}/ \
            --exclude "*" \
            --include "index.html" \
            --include "registerSW.js" \
            --include "manifest.webmanifest" \
            --include "sw.js" \
            --cache-control "no-cache, no-store, must-revalidate"
          # RFC 9728 / RFC 8414 discovery docs — no-cache + explicit JSON
          # content type. These files have no extension (oauth-protected-resource,
          # oauth-authorization-server, openid-configuration) so S3 would otherwise
          # serve them as application/octet-stream, which breaks MCP/OAuth2 clients.
          aws s3 sync tools/app-shell/dist/.well-known/ \
            s3://${{ steps.target.outputs.s3_bucket }}/.well-known/ \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/json"

      - name: Upload reports manifest (${{ steps.target.outputs.env_label }})
        run: |
          aws s3 cp tools/app-shell/dist/api/reports \
            s3://${{ steps.target.outputs.s3_bucket }}/api/reports \
            --content-type "application/json" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache (${{ steps.target.outputs.env_label }})
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.target.outputs.cf_distribution }} \
            --paths "/*"
