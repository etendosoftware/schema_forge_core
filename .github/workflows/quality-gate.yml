name: Schema Forge Quality Gate

# DISABLED: the schema_forge monorepo was split into separate repos
# (schema_forge_core + etendo_schema_forge). The Quality Gate validates window
# artifacts (contract / i18n / imports / invariants) which now live in the
# functional repo, not here — the split removed quality-gate.config.json and all
# artifacts/ from this repo. The gate's tooling (cli/src/quality-gate/) stays as
# a published package the functional repo consumes; only the workflow that ran it
# against local artifacts is neutralized. Kept as a no-op that always succeeds so
# any branch-protection rule requiring the "sfqg" status still resolves. To
# re-enable, restore the previous steps from git history.

on:
  pull_request:
    branches: [develop, epic/ETP-3504]
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read

jobs:
  sfqg:
    runs-on: ubuntu-latest
    steps:
      - name: No-op (quality gate disabled after repo split)
        run: echo "Quality Gate is disabled here — window artifacts live in the functional repo."
