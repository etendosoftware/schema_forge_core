name: Data TestID Check

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main, develop, 'epic/**']

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Check data-testid coverage
        run: npm run check:data-testid
