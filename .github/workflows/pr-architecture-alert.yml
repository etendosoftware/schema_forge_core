name: Copilot PR Review

on:
  pull_request:
    branches: [develop, epic/ETP-3504]
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  architecture-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Analyze PR diff
        run: >-
          node cli/src/pr-review.js
          --base "${{ github.event.pull_request.base.sha }}"
          --head "${{ github.event.pull_request.head.sha }}"
          --out review-report.json

      - name: Publish PR review
        id: publish
        uses: actions/github-script@v7
        env:
          REPORT_PATH: review-report.json
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync(process.env.REPORT_PATH, 'utf8'));
            const marker = '<!-- copilot-pr-review -->';
            const issue_number = context.issue.number;
            const pull_number = context.payload.pull_request.number;
            const commit_id = context.payload.pull_request.head.sha;

            core.setOutput('decision', report.summary.decision);

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existingComment = comments.find((comment) =>
              comment.user?.login === 'github-actions[bot]' && comment.body?.includes(marker)
            );

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number,
              per_page: 100,
            });

            const managedReviews = reviews.filter((review) =>
              review.user?.login === 'github-actions[bot]' && review.body?.includes(marker)
            );

            async function dismissManagedReviews(message, shouldDismiss = () => true) {
              for (const review of managedReviews) {
                if (review.state !== 'CHANGES_REQUESTED' || review.dismissed_at || !shouldDismiss(review)) continue;
                await github.rest.pulls.dismissReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number,
                  review_id: review.id,
                  message,
                });
              }
            }

            if (report.summary.decision === 'clean') {
              if (existingComment) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                });
              }

              await dismissManagedReviews('Blocking findings resolved by the latest Copilot PR Review run.');
              return;
            }

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: report.body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body: report.body,
              });
            }

            if (report.summary.decision === 'request_changes') {
              await dismissManagedReviews(
                'Superseded by a newer Copilot PR Review run for this PR head commit.',
                (review) => review.commit_id !== commit_id,
              );


              const alreadyReviewedCommit = managedReviews.some((review) =>
                review.state === 'CHANGES_REQUESTED' && review.commit_id === commit_id
              );

              if (!alreadyReviewedCommit) {
                await github.rest.pulls.createReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number,
                  commit_id,
                  event: 'REQUEST_CHANGES',
                  body: report.body,
                });
              }
              return;
            }

            await dismissManagedReviews('Blocking findings downgraded to warnings by the latest Copilot PR Review run.');

      - name: Fail on blocking findings
        if: steps.publish.outputs.decision == 'request_changes'
        run: |
          echo 'Blocking findings detected by Copilot PR Review.'
          exit 1