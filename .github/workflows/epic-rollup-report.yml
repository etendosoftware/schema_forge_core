name: Epic Rollout Report

on:
  pull_request:
    branches: [develop]
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  epic-rollup-report:
    if: github.event.pull_request.head.ref == 'epic/ETP-3504'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Collect epic rollout data
        uses: actions/github-script@v7
        env:
          OUTPUT_PATH: epic-rollup-data.json
        with:
          script: |
            const fs = require('fs');
            const entryMarker = '<!-- epic-rollup-entry -->';
            const reviewMarker = '<!-- copilot-pr-review -->';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const epicRef = context.payload.pull_request.head.ref;

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const mergeCommits = commits.filter((commit) =>
              (commit.parents?.length || 0) > 1 || commit.commit?.message?.startsWith('Merge pull request #')
            );

            const includedPullRequests = new Map();
            for (const commit of mergeCommits) {
              const associated = await github.request('GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls', {
                owner,
                repo,
                commit_sha: commit.sha,
              });

              const matchingPullRequest = associated.data.find((pullRequest) =>
                pullRequest.merge_commit_sha === commit.sha
                && pullRequest.base.ref === epicRef
                && pullRequest.number !== pull_number
              );

              if (matchingPullRequest) {
                includedPullRequests.set(matchingPullRequest.number, matchingPullRequest);
              }
            }

            const normalizedPullRequests = [];
            for (const pullRequest of [...includedPullRequests.values()].sort((left, right) => left.number - right.number)) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pullRequest.number,
                per_page: 100,
              });

              const latestEntry = comments
                .filter((comment) => comment.user?.login === 'github-actions[bot]' && comment.body?.includes(entryMarker))
                .sort((left, right) => (left.created_at || '').localeCompare(right.created_at || ''))
                .at(-1);

              let latestReviewBody = '';
              if (!latestEntry) {
                const reviews = await github.paginate(github.rest.pulls.listReviews, {
                  owner,
                  repo,
                  pull_number: pullRequest.number,
                  per_page: 100,
                });

                const latestReview = [
                  ...comments
                    .filter((comment) => comment.user?.login === 'github-actions[bot]' && comment.body?.includes(reviewMarker))
                    .map((comment) => ({ body: comment.body, timestamp: comment.created_at || '' })),
                  ...reviews
                    .filter((review) => review.user?.login === 'github-actions[bot]' && review.body?.includes(reviewMarker))
                    .map((review) => ({ body: review.body, timestamp: review.submitted_at || review.created_at || '' })),
                ]
                  .sort((left, right) => left.timestamp.localeCompare(right.timestamp))
                  .at(-1);

                latestReviewBody = latestReview?.body || '';
              }

              normalizedPullRequests.push({
                number: pullRequest.number,
                title: pullRequest.title,
                url: pullRequest.html_url,
                author: pullRequest.user?.login || 'unknown',
                mergedAt: pullRequest.merged_at,
                body: pullRequest.body || '',
                rollupEntryBody: latestEntry?.body || '',
                reviewReportBody: latestReviewBody,
              });
            }

            const payload = {
              epicPullRequest: {
                number: context.payload.pull_request.number,
                title: context.payload.pull_request.title,
                url: context.payload.pull_request.html_url,
                baseRefName: context.payload.pull_request.base.ref,
                headRefName: context.payload.pull_request.head.ref,
              },
              includedPullRequests: normalizedPullRequests,
            };

            fs.writeFileSync(process.env.OUTPUT_PATH, JSON.stringify(payload, null, 2));

      - name: Render epic rollout report
        run: node cli/src/epic-rollup-report.js --input epic-rollup-data.json --out epic-rollup-report.md

      - name: Publish epic rollout report
        uses: actions/github-script@v7
        env:
          REPORT_PATH: epic-rollup-report.md
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- epic-rollup-report -->';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const body = fs.readFileSync(process.env.REPORT_PATH, 'utf8');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existingComment = comments.find((comment) =>
              comment.user?.login === 'github-actions[bot]' && comment.body?.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Add report to job summary
        run: cat epic-rollup-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload epic rollout artifact
        uses: actions/upload-artifact@v4
        with:
          name: epic-rollup-report
          path: epic-rollup-report.md
