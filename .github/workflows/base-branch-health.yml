name: Base Branch Health Check

# Blocks merging a PR when the TARGET branch (main, develop, epic/*) is already
# failing at its latest commit. The team must fix the base branch (direct
# commit) first; once its checks are green, re-run this check on the PR
# ("Re-run jobs") to unblock the merge.
#
# It inspects BOTH reporting mechanisms on the base commit:
#   - Check runs   → GitHub Actions workflows
#   - Commit statuses → Jenkins (posted via build-update-github.sh)
#
# To actually block merges, add "Base branch is green" to the required status
# checks in the branch protection rules of main/develop/epic branches.

on:
  pull_request:
    # `labeled` lets the escape hatch below re-evaluate as soon as the
    # 'base-branch-fix' label is applied — no manual "Re-run jobs" needed.
    types: [opened, reopened, synchronize, labeled]
    branches:
      - main
      - develop
      - 'epic/**'

permissions:
  contents: read
  checks: read
  statuses: read

jobs:
  base-branch-health:
    name: Base branch is green
    runs-on: ubuntu-latest
    steps:
      - name: Check latest commit of the base branch
        uses: actions/github-script@v7
        with:
          script: |
            // ── TEMPORARILY DISABLED (per request) ──────────────────────────
            // The base-branch health gate is skipped for now: the job still runs
            // so any required-status-check reference stays satisfied (green), but
            // it returns immediately without inspecting the base branch. The full
            // logic below is preserved — remove this early return to re-enable it.
            core.info('Base branch health check is temporarily disabled — passing.');
            return;

            const { owner, repo } = context.repo;
            const baseRef = context.payload.pull_request.base.ref;

            // This job's own check-run name (see `name:` above). With
            // bidirectional PRs (epic → develop and the "Sync develop into
            // epic" PR develop → epic), this gate would otherwise count the
            // OTHER branch's base-health check run as a failure — and since
            // that one is red for the same reason, the two branches gate each
            // other into a circular base↔base deadlock even when every real
            // check passes. Skip our own check run below so we never gate on it.
            const SELF_CHECK_NAME = 'Base branch is green';

            // ── Escape hatch: PR that repairs the base branch ───────────────
            // A PR labeled 'base-branch-fix' is allowed through even when the
            // base is red: it IS the change that turns the base green again, so
            // this gate would otherwise deadlock it (the base can only go green
            // once this PR merges). Applying the label re-runs this workflow via
            // the `labeled` event above.
            //
            // The bypass is deliberately narrow and auditable: it applies only
            // to a SINGLE-COMMIT PR carrying the 'base-branch-fix' label. The
            // one-commit rule is what keeps the bypass from being used to sneak
            // unrelated work past the gate — a base fix is a focused, reviewable
            // change. Other labels are intentionally allowed to coexist (e.g. a
            // domain-boundary override), since those gate other, independent
            // checks. If the commit constraint is violated, the gate fails with a
            // clear message instead of silently falling back to the base check.
            const labels = (context.payload.pull_request.labels || []).map(l => l.name);
            if (labels.includes('base-branch-fix')) {
              const commitCount = context.payload.pull_request.commits;
              if (commitCount !== 1) {
                await core.summary
                  .addHeading(`Base branch health: ${baseRef}`, 3)
                  .addRaw(`PR labeled \`base-branch-fix\` has ${commitCount} commits — the bypass requires exactly 1.`)
                  .write();
                core.setFailed(
                  `A 'base-branch-fix' PR must be exactly ONE commit (this one has ${commitCount}). ` +
                  `Squash it to a single commit, then re-run this check.`
                );
                return;
              }
              await core.summary
                .addHeading(`Base branch health: ${baseRef}`, 3)
                .addRaw(`Skipped — single-commit PR labeled \`base-branch-fix\` (expected to repair the base branch).`)
                .write();
              core.info(
                `PR labeled 'base-branch-fix' with 1 commit → skipping base health gate for '${baseRef}'.`
              );
              return;
            }

            // Latest commit on the base branch (NOT the merge base — we want
            // the current tip the PR would merge into).
            const { data: branch } = await github.rest.repos.getBranch({
              owner, repo, branch: baseRef,
            });
            const sha = branch.commit.sha;
            core.info(`Base branch: ${baseRef} @ ${sha}`);

            const failed = [];   // [name, state]
            const pending = [];  // [name]
            let total = 0;

            // ── 1. Check runs (GitHub Actions) ──────────────────────────────
            const checkRuns = await github.paginate(github.rest.checks.listForRef, {
              owner, repo, ref: sha, per_page: 100,
            });
            for (const run of checkRuns) {
              if (run.name === SELF_CHECK_NAME) continue;  // ignore our own check run to avoid a circular base↔base deadlock
              total++;
              if (run.status !== 'completed') {
                pending.push(`${run.name} (check run: ${run.status})`);
              } else if (!['success', 'neutral', 'skipped'].includes(run.conclusion)) {
                failed.push(`${run.name} (check run: ${run.conclusion})`);
              }
            }

            // ── 2. Commit statuses (Jenkins posts here) ─────────────────────
            // getCombinedStatusForRef already collapses to the latest status
            // per context.
            const { data: combined } = await github.rest.repos.getCombinedStatusForRef({
              owner, repo, ref: sha,
            });
            for (const st of combined.statuses) {
              total++;
              if (st.state === 'pending') {
                pending.push(`${st.context} (status: pending)`);
              } else if (st.state !== 'success') {
                failed.push(`${st.context} (status: ${st.state})`);
              }
            }

            // ── Verdict ─────────────────────────────────────────────────────
            const summary = core.summary
              .addHeading(`Base branch health: ${baseRef}`, 3)
              .addRaw(`Latest commit: \`${sha}\` — ${total} check(s) inspected.`)
              .addBreak();

            if (failed.length > 0) {
              summary.addHeading('Failing on the base branch', 4)
                .addList(failed);
              await summary.write();
              core.setFailed(
                `The base branch '${baseRef}' is FAILING at its latest commit (${sha.slice(0, 8)}).\n` +
                `Failing check(s): ${failed.join(', ')}.\n` +
                `Merging this PR is blocked until the base branch is fixed.\n` +
                `→ Fix it with a direct commit to '${baseRef}', wait for its checks to pass, ` +
                `then re-run this check on the PR (Re-run jobs).`
              );
              return;
            }

            if (pending.length > 0) {
              summary.addHeading('Still running on the base branch', 4)
                .addList(pending);
              await summary.write();
              core.setFailed(
                `The base branch '${baseRef}' still has check(s) IN PROGRESS at ${sha.slice(0, 8)}: ` +
                `${pending.join(', ')}.\n` +
                `Wait for them to finish and re-run this check (Re-run jobs).`
              );
              return;
            }

            if (total === 0) {
              summary.addRaw('No checks reported on the base commit (e.g. path-filtered workflows). Treated as healthy.');
              await summary.write();
              core.info(`No checks found on ${sha} — treating the base branch as healthy.`);
              return;
            }

            summary.addRaw(`✅ All checks passed on the base branch.`);
            await summary.write();
            core.info(`Base branch '${baseRef}' is green — merge allowed.`);
