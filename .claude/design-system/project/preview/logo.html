<!DOCTYPE html>

<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--bg-page);display:flex;align-items:center;gap:28px;flex-wrap:wrap;}
  .col{display:flex;flex-direction:column;gap:6px;align-items:center;}
  .caption{font:500 11px/14px var(--font-sans);color:var(--fg-3);letter-spacing:.04em;text-transform:uppercase;}
  /* Mark — rounded tile, yellow gradient, dark navy glyph */
  .mark{display:flex;align-items:center;justify-content:center;border-radius:12px;position:relative;box-shadow:inset 0 0 0 1px var(--border-1);}
  .mark::before{content:"";position:absolute;inset:3px;border-radius:9px;background:linear-gradient(#F8D414,#FFE356);}
  .mark svg{position:relative;z-index:1;color:#202452;}
  .mark-64{width:64px;height:64px;} .mark-64 svg{width:28px;height:28px;}
  .mark-44{width:44px;height:44px;} .mark-44 svg{width:20px;height:20px;}
  .mark-32{width:32px;height:32px;border-radius:8px;} .mark-32::before{inset:2px;border-radius:6px;} .mark-32 svg{width:15px;height:15px;}
  /* Lockup */
  .lockup{display:flex;align-items:center;gap:10px;}
  .wordmark{font:700 20px/32px var(--font-sans);color:var(--etendo-ink);letter-spacing:-0.01em;}
  /* Inverse */
  .mono{display:flex;align-items:center;justify-content:center;background:#121217;border-radius:12px;width:64px;height:64px;}
  .mono svg{width:28px;height:28px;color:#FFDA44;}
