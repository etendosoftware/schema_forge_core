<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-page);}
  .grid{display:grid;grid-template-columns:repeat(10,1fr);gap:8px;}
  .sw{border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-1);display:flex;flex-direction:column;}
  .chip{height:64px;}
  .meta{padding:8px 10px;background:#fff;}
  .name{font:600 11px/14px var(--font-sans);color:var(--fg-1);}
  .hex{font:500 10px/13px var(--font-mono);color:var(--fg-3);}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#FFFFFF;border-bottom:1px solid var(--border-1)"></div><div class="meta"><div class="name">n-0</div><div class="hex">#FFFFFF</div></div></div>
  <div class="sw"><div class="chip" style="background:#F5F7F9"></div><div class="meta"><div class="name">n-50</div><div class="hex">#F5F7F9</div></div></div>
  <div class="sw"><div class="chip" style="background:#EEF1F5"></div><div class="meta"><div class="name">n-100</div><div class="hex">#EEF1F5</div></div></div>
  <div class="sw"><div class="chip" style="background:#E3E7EC"></div><div class="meta"><div class="name">n-200</div><div class="hex">#E3E7EC</div></div></div>
  <div class="sw"><div class="chip" style="background:#CBD2DB"></div><div class="meta"><div class="name">n-300</div><div class="hex">#CBD2DB</div></div></div>
  <div class="sw"><div class="chip" style="background:#9AA3B0"></div><div class="meta"><div class="name">n-400</div><div class="hex">#9AA3B0</div></div></div>
  <div class="sw"><div class="chip" style="background:#6B7280"></div><div class="meta"><div class="name">n-500</div><div class="hex">#6B7280</div></div></div>
  <div class="sw"><div class="chip" style="background:#4B5563"></div><div class="meta"><div class="name">n-600</div><div class="hex">#4B5563</div></div></div>
  <div class="sw"><div class="chip" style="background:#303743"></div><div class="meta"><div class="name">n-700</div><div class="hex">#303743</div></div></div>
  <div class="sw"><div class="chip" style="background:#19191D"></div><div class="meta"><div class="name">n-900</div><div class="hex">#19191D</div></div></div>
</div>
</body></html>
