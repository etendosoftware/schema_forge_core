<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-page);display:flex;align-items:flex-end;gap:18px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .bar{background:var(--etendo-yellow);border-radius:4px;}
  .tag{font:500 11px/14px var(--font-mono);color:var(--fg-2);}
  .lab{font:600 11px/14px var(--font-sans);color:var(--fg-1);}
</style></head><body>
  <div class="cell"><div class="bar" style="width:24px;height:4px"></div><div class="lab">1</div><div class="tag">4px</div></div>
  <div class="cell"><div class="bar" style="width:24px;height:8px"></div><div class="lab">2</div><div class="tag">8px</div></div>
  <div class="cell"><div class="bar" style="width:24px;height:12px"></div><div class="lab">3</div><div class="tag">12px</div></div>
  <div class="cell"><div class="bar" style="width:24px;height:16px"></div><div class="lab">4</div><div class="tag">16px</div></div>
  <div class="cell"><div class="bar" style="width:24px;height:20px"></div><div class="lab">5</div><div class="tag">20px</div></div>
  <div class="cell"><div class="bar" style="width:24px;height:24px"></div><div class="lab">6</div><div class="tag">24px</div></div>
  <div class="cell"><div class="bar" style="width:24px;height:32px"></div><div class="lab">8</div><div class="tag">32px</div></div>
  <div class="cell"><div class="bar" style="width:24px;height:40px"></div><div class="lab">10</div><div class="tag">40px</div></div>
  <div class="cell"><div class="bar" style="width:24px;height:48px"></div><div class="lab">12</div><div class="tag">48px</div></div>
  <div class="cell"><div class="bar" style="width:24px;height:64px"></div><div class="lab">16</div><div class="tag">64px</div></div>
</body></html>
