<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Table</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:16px;background:#fff;font:400 13px/18px var(--font-sans);}
  table{width:100%;border-collapse:collapse;}
  th{text-align:left;font:500 12px/16px var(--font-sans);color:var(--fg-3);padding:10px 12px;border-bottom:1px solid var(--border-1);font-weight:500;}
  td{padding:12px;border-bottom:1px solid var(--border-1);color:var(--fg-2);vertical-align:middle;}
  tr:hover td{background:var(--bg-hover);}
  .strong{color:var(--fg-1);font-weight:600;}
  .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;vertical-align:middle;}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font:500 11px/14px var(--font-sans);}
  .pend{background:var(--pending-bg);color:var(--pending-fg);border:1px solid var(--pending-border);}
  .chip{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--bg-subtle);border:1px solid var(--border-1);font-size:12px;color:var(--fg-2);}
  .num{font-variant-numeric:tabular-nums;text-align:right;}
  input[type=checkbox]{appearance:none;width:14px;height:14px;border:1.5px solid var(--border-2);border-radius:3px;cursor:pointer;}
  input[type=checkbox]:checked{background:var(--etendo-yellow);border-color:var(--etendo-yellow);}
</style></head><body>
  <table>
    <thead><tr><th style="width:24px"><input type="checkbox"></th><th>Fecha</th><th>Nº</th><th>Vencimiento</th><th>Cliente</th><th>Tags</th><th class="num">Total</th><th>Estado</th></tr></thead>
    <tbody>
      <tr><td><input type="checkbox"></td><td class="strong">08/04/2026</td><td>I260001</td><td><span class="dot" style="background:#F2CB00"></span>09/03/2026</td><td>Etendo Software S.A.</td><td><span class="chip">GT709 ×</span></td><td class="num strong">€624.000,00</td><td><span class="pill pend">Pendiente</span></td></tr>
      <tr><td><input type="checkbox"></td><td class="strong">12/05/2026</td><td>I259999</td><td><span class="dot" style="background:#1E7A47"></span>23/03/2026</td><td>—</td><td></td><td class="num strong">€3.009,00</td><td><span class="pill pend">Pendiente</span></td></tr>
      <tr><td><input type="checkbox"></td><td class="strong">01/03/2026</td><td>I257952</td><td><span class="dot" style="background:#D50B3E"></span>15/01/2026</td><td>Restaurante Luna Llena Cordoba S.A.</td><td></td><td class="num strong">€983.000,00</td><td><span class="pill pend">Pendiente</span></td></tr>
    </tbody>
  </table>
</body></html>
