<!DOCTYPE html><html><head><meta charset="utf-8"><title>Yellow — warning</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
 body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}
 .wrap{display:flex;flex-direction:column;gap:10px;}
 .label{font:600 11px/14px var(--font-sans);letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);}
 .row{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;}
 .c{aspect-ratio:1.1;border-radius:8px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);padding:8px;display:flex;flex-direction:column;justify-content:space-between;font:500 10px/12px ui-monospace,monospace;}
 .c .w{font:600 11px/14px var(--font-sans);}
</style></head><body><div class="wrap">
 <div class="label">Yellow — warning</div>
 <div class="row">
 <div class="c" style="background:#FFF9EB;color:#121217"><div class="w">50</div><div>#FFF9EB</div></div><div class="c" style="background:#FFF3D6;color:#121217"><div class="w">100</div><div>#FFF3D6</div></div><div class="c" style="background:#FFE7AD;color:#121217"><div class="w">200</div><div>#FFE7AD</div></div><div class="c" style="background:#FFDA85;color:#121217"><div class="w">300</div><div>#FFDA85</div></div><div class="c" style="background:#FFCE5C;color:#ffffff"><div class="w">400</div><div>#FFCE5C</div></div><div class="c" style="background:#FFC233;color:#ffffff"><div class="w">500</div><div>#FFC233</div></div><div class="c" style="background:#FAAF00;color:#ffffff"><div class="w">600</div><div>#FAAF00</div></div><div class="c" style="background:#C28800;color:#ffffff"><div class="w">700</div><div>#C28800</div></div><div class="c" style="background:#8A6100;color:#ffffff"><div class="w">800</div><div>#8A6100</div></div><div class="c" style="background:#523900;color:#ffffff"><div class="w">900</div><div>#523900</div></div>
 </div>
</div></body></html>
