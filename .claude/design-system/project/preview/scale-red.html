<!DOCTYPE html><html><head><meta charset="utf-8"><title>Red — error</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
 body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans);}

 .row{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;}
 .c{aspect-ratio:1.1;border-radius:8px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);padding:8px;display:flex;flex-direction:column;justify-content:space-between;font:500 10px/12px ui-monospace,monospace;}
 .c .w{font:600 11px/14px var(--font-sans);}
</style></head><body><div class="wrap">
 <div class="label">Red — error</div>
 <div class="row">
 <div class="c" style="background:#FEF0F4;color:#121217"><div class="w">50</div><div>#FEF0F4</div></div><div class="c" style="background:#FDD8E1;color:#121217"><div class="w">100</div><div>#FDD8E1</div></div><div class="c" style="background:#FBB1C4;color:#121217"><div class="w">200</div><div>#FBB1C4</div></div><div class="c" style="background:#F98BA6;color:#121217"><div class="w">300</div><div>#F98BA6</div></div><div class="c" style="background:#F76489;color:#ffffff"><div class="w">400</div><div>#F76489</div></div><div class="c" style="background:#F53D6B;color:#ffffff"><div class="w">500</div><div>#F53D6B</div></div><div class="c" style="background:#F3164E;color:#ffffff"><div class="w">600</div><div>#F3164E</div></div><div class="c" style="background:#D50B3E;color:#ffffff"><div class="w">700</div><div>#D50B3E</div></div><div class="c" style="background:#AF0932;color:#ffffff"><div class="w">800</div><div>#AF0932</div></div><div class="c" style="background:#880727;color:#ffffff"><div class="w">900</div><div>#880727</div></div>
 </div>
</div></body></html>
