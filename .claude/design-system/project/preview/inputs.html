<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--bg-page);display:flex;flex-direction:column;gap:14px;}
  .field{display:flex;flex-direction:column;gap:6px;max-width:520px;}
  label{font:500 12px/16px var(--font-sans);color:var(--fg-2);}
  label .req{color:var(--danger-fg);margin-left:2px;}
  .inp{display:flex;align-items:center;gap:8px;height:40px;padding:0 12px;border-radius:8px;border:1px solid var(--border-2);background:#fff;}
  .inp:focus-within{border-color:var(--etendo-yellow);box-shadow:var(--shadow-focus);}
  .inp svg{width:16px;height:16px;stroke:var(--fg-3);stroke-width:2;fill:none;}
  .inp input{flex:1;border:0;outline:0;font:400 14px/20px var(--font-sans);color:var(--fg-1);background:transparent;}
  .inp input::placeholder{color:var(--fg-4);}
  .global{background:var(--bg-subtle);border:1px solid transparent;border-radius:999px;height:36px;padding:0 16px;}
  .global input::placeholder{color:var(--fg-3);}
</style></head><body>
  <div class="field"><label>Correo electrónico <span class="req">*</span></label>
    <div class="inp">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
      <input value="jhon.doe@futitservices.com">
    </div>
  </div>
  <div class="field"><label>Contraseña <span class="req">*</span></label>
    <div class="inp">
      <input type="password" value="••••••••••">
      <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12Z"/><circle cx="12" cy="12" r="3"/></svg>
    </div>
  </div>
  <div class="field">
    <div class="inp global">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input placeholder="Buscar clientes, pedidos, facturas…">
      <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 17v5"/></svg>
    </div>
  </div>
</body></html>
