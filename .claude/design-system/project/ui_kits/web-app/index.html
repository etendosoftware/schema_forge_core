<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Etendo · UI kit</title>
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="InicioPage.jsx"></script>
<script type="text/babel" src="ContactosPage.jsx"></script>
<script type="text/babel" src="FacturasPage.jsx"></script>

<script type="text/babel">
const PAGE_META = {
  inicio:          {title:'Inicio',           breadcrumb:'Inicio'},
  contactos:       {title:'Contactos',        count:112, breadcrumb:'Contactos'},
  'facturas-venta':{title:'Facturas de venta',count:3,   breadcrumb:'Ventas / Facturas'},
  'facturas-compra':{title:'Facturas de compra',         breadcrumb:'Compras / Facturas'},
};

const App = () => {
  const [active, setActive] = React.useState('inicio');
  const [expanded, setExpanded] = React.useState(false);
  const [toasts, setToasts] = React.useState([]);

  const toast = (text, variant='success') => {
    const id = Math.random().toString(36).slice(2);
    setToasts(ts => [...ts, {id, text, variant}]);
    setTimeout(() => setToasts(ts => ts.filter(t => t.id !== id)), 3500);
  };
  const closeToast = id => setToasts(ts => ts.filter(t => t.id !== id));

  const pick = (id) => {
    if (id === 'ventas') id = 'facturas-venta';
    if (id === 'compras') id = 'facturas-compra';
    setActive(id);
  };

  const meta = PAGE_META[active] || {title: active, breadcrumb: active};

  let body = null;
  if (active === 'inicio') body = <InicioPage/>;
  else if (active === 'contactos') body = <ContactosPage onToast={toast}/>;
  else if (active === 'facturas-venta') body = <FacturasVentaPage onToast={toast}/>;
  else if (active === 'facturas-compra') body = <FacturasCompraPage/>;
  else body = <div className="empty"><h3>Próximamente</h3><p>Esta sección aún no está incluida en el UI kit.</p></div>;

  return (
    <>
      <AppShell
        active={active} onPick={pick}
        expanded={expanded} onToggleSide={()=>setExpanded(e=>!e)}
        title={meta.title} count={meta.count} breadcrumb={meta.breadcrumb}
        onOpenCopilot={()=>toast('Copilot se abrirá en breve','success')}>
        {body}
      </AppShell>
      <ToastLayer toasts={toasts} onClose={closeToast}/>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
